name: BladeX Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Gradle Build & Release
    runs-on: ubuntu-latest

    steps:
      # 1) Repoyu cek
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java 21 kur
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3) Gradle setup (wrapper.jar gerektirmez, versiyonu direkt indirir)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      # 4) Derle
      - name: Build with Gradle
        run: gradle build --no-daemon

      # 5) JAR artifact olarak yukle
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BladeX-${{ github.sha }}
          path: build/libs/BladeX-*.jar
          retention-days: 30

      # 6) Tag push ise GitHub Release olustur
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/BladeX-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
